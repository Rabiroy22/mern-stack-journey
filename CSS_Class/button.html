<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color: #117a7a;
            border: none;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            padding: 10px 100px;
            border-radius: 2px;            
        }

        button:hover{
            opacity: 0.8;
            cursor: pointer;
        }

        .box{
            background-color: skyblue;
            width: 200px;
            height: 200px;
            padding: 20px;
            border: 5px solid green;
            margin: 50px;
            box-sizing: border-box;
        }

        .box2{
            background-color: #117a7a;
            width: 150px;
            height: 120px;
            padding: 20px 90px;
            border: 10px solid brown;
            margin: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <!-- width = width + left padding + right padding + left border + right border-->

    <!-- height = height + top padding + bottom padding + top border + bottom border-->
    
    <p>Register with The Souled Store</p>
    <button>Register</button>

    <div class="box"></div>

    <div class="box2"></div>

</body>
</html>
