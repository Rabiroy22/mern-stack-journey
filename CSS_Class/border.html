<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border</title>
    <style>
        h1{
            border-style: double;
            border-width: 5px;
            border-color: green;
            text-align: center;
            /* border-radius: 15px; */
            border-top-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        a{
            border: 5px dashed blue;
        }

        p{
            border: solid brown 4px;
        }

        pre{
            border-top: 3px solid palevioletred;
            border-bottom: 5px solid orange;
            border-left: 4px dashed blue;
            border-right: 4px double red;
        }

        img{
            border: 3px solid black;
            border-radius: 100%;
            opacity: 0.8;
        }

        img:hover{
            opacity: 1;
            border: 3px solid green;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- opacity - 0.0-1.0 -->
    <h1>SkillWaala</h1>
    <p>Devanshu sir</p>
    <a href="">Home</a>
    <pre>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorem, repudiandae.</pre>
    <!-- <img src="./media/male.png" alt="" width="200px"> -->
    <img src="./media/female.jpg" alt="" width="150px" height="150px">
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequuntur, quis.</p>
</body>
</html>
